<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700&family=Lexend+Deca:wght@900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #101010;
  --sidebar-bg: #1a1a1a;
  --card-bg: #2f2f2f;
  --accent: #5fb1df;
  --text: #fff;
  --text-muted: rgba(176,176,176,0.64);
  --cam-blue: #4f88fa;
  --cam-red: #fa4e4e;
  --cam-purple: #a687fc;
  --cam-green: #29cb6f;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
.app{display:flex;height:100vh}

/* ---- Sidebar ---- */
.sidebar{width:100px;background:var(--sidebar-bg);display:flex;flex-direction:column;align-items:center;padding:20px 0;flex-shrink:0}
.logo{display:flex;align-items:center;gap:6px;margin-bottom:40px}
.logo svg{width:18px;height:18px;fill:var(--accent)}
.logo span{font-family:'Lexend Deca',sans-serif;font-weight:900;font-size:12px;color:var(--accent)}
.nav{display:flex;flex-direction:column;gap:28px;align-items:center;flex:1}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;position:relative;width:100%}
.nav-item svg{width:28px;height:28px;fill:var(--text-muted);transition:fill .2s}
.nav-item span{font-size:11px;color:var(--text-muted);transition:color .2s}
.nav-item.active svg{fill:var(--text)}
.nav-item.active span{color:var(--text)}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:4px;height:48px;background:var(--accent);border-radius:0 4px 4px 0}

/* ---- Main content ---- */
.main{flex:1;display:flex;flex-direction:column;padding:24px 28px;overflow-y:auto;min-width:0}
.main-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.main-header h1{font-size:24px;font-weight:600}
.layout{display:grid;grid-template-columns:320px 1fr;grid-template-rows:1fr 190px;gap:16px;flex:1;min-height:0}

/* ---- Left panel ---- */
.left-panel{grid-row:1/3;display:flex;flex-direction:column;gap:16px;overflow-y:auto;padding-right:8px}
.section-title{font-size:13px;font-weight:600;margin-bottom:8px}
.watching-header{display:flex;align-items:center;gap:20px;margin-bottom:10px}
.watching-header span{font-size:13px;font-weight:600}
.watching-header .filter{font-size:10px;color:var(--text);opacity:.8;cursor:pointer;display:flex;align-items:center;gap:2px}
.filter svg{width:14px;height:14px;fill:var(--text)}

/* Camera list */
.cam-list{display:flex;flex-direction:column;gap:4px}
.cam-item{background:var(--card-bg);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;position:relative;transition:background .15s}
.cam-item:hover{background:#3a3a3a}
.cam-item::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:0 8px 8px 0}
.cam-item[data-color="blue"]::before{background:var(--cam-blue)}
.cam-item[data-color="red"]::before{background:var(--cam-red)}
.cam-item[data-color="purple"]::before{background:var(--cam-purple)}
.cam-item[data-color="green"]::before{background:var(--cam-green)}
.cam-item .cam-name{font-size:12px}
.cam-item .cam-toggle{width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:.6;transition:opacity .15s}
.cam-item .cam-toggle:hover{opacity:1}
.cam-item .cam-toggle svg{width:14px;height:14px;fill:var(--text)}
.cam-detail{background:var(--card-bg);padding:8px 14px 12px 30px;display:none;flex-direction:column;gap:4px}
.cam-detail.open{display:flex}
.cam-detail .info{font-size:10px;color:var(--text-muted)}
.cam-detail .info.highlight{color:var(--accent)}

/* Function list */
.func-list{background:var(--card-bg);padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.func-item{display:flex;align-items:center;justify-content:space-between}
.func-item span{font-size:12px}
.toggle{width:36px;height:18px;background:#555;border-radius:9px;position:relative;cursor:pointer;transition:background .2s}
.toggle.on{background:var(--cam-green)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:50%;transition:left .2s}
.toggle.on::after{left:20px}

/* Mini map */
.minimap-section canvas{width:100%;border-radius:4px;display:block}
.minimap-footer{display:flex;align-items:center;gap:8px;margin-top:8px}
.minimap-footer .speed-label{font-size:10px;color:var(--cam-red);font-weight:700}
.minimap-footer .speed-value{font-size:10px;background:var(--card-bg);padding:2px 12px;border-radius:4px}

/* ---- Right panel ---- */
.video-panel{position:relative;background:#000;border-radius:6px;overflow:hidden;min-height:0}
.video-panel img,.video-panel video{width:100%;height:100%;object-fit:contain;display:block}
.video-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:14px;background:#181818}
.video-bar{position:absolute;top:0;left:0;right:0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(0,0,0,.6) 0%,transparent 100%)}
.video-bar-left,.video-bar-right{display:flex;align-items:center;gap:12px}
.video-bar .tag{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600}
.video-bar .tag svg{width:14px;height:14px;fill:var(--text)}
.video-expand{position:absolute;bottom:12px;right:12px;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(20px);background:rgba(255,255,255,.15)}
.video-expand svg{width:16px;height:16px;fill:var(--text)}

.map3d-panel{background:var(--card-bg);border-radius:6px;overflow:hidden;position:relative;height:100%;min-height:0}
.map3d-panel .panel-title{font-size:13px;font-weight:600;padding:6px 14px}
.map3d-canvas{width:100%;height:calc(100% - 30px);display:flex;align-items:center;justify-content:center}
.map3d-canvas canvas{height:100%;width:auto;max-width:100%;display:block}

/* State badges */
.state-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;margin-left:8px}
.state-badge.running{background:rgba(34,197,94,.2);color:#22c55e}
.state-badge.stopped{background:rgba(100,116,139,.2);color:#94a3b8}
.state-badge.error{background:rgba(239,68,68,.2);color:#ef4444}
.state-badge.starting{background:rgba(234,179,8,.2);color:#eab308}

/* ---- Video grid ---- */
#video-container{width:100%;height:100%;display:grid;gap:2px;background:#000;overflow:hidden}
#video-container.mode-1{grid-template-columns:1fr;grid-template-rows:1fr}
#video-container.mode-2{grid-template-columns:1fr 1fr;grid-template-rows:1fr}
#video-container.mode-3,#video-container.mode-4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.vid-cell{position:relative;overflow:hidden;background:#111;cursor:pointer;min-height:0}
.vid-cell img{width:100%;height:100%;object-fit:contain;display:block;background:#000}
.vid-label{position:absolute;top:6px;left:8px;font-size:9px;font-weight:700;background:rgba(0,0,0,.6);color:#fff;padding:2px 8px;border-radius:3px;pointer-events:none;z-index:1}
.vid-cell:hover .vid-label{color:var(--accent)}
.vid-empty{display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:14px;background:#181818;width:100%;height:100%}

/* ---- View-mode toggle ---- */
.view-btns{display:flex;gap:3px;margin-left:8px}
.vbtn{background:rgba(255,255,255,.12);border:none;color:rgba(255,255,255,.7);width:24px;height:20px;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:background .15s}
.vbtn svg{width:13px;height:13px;fill:currentColor}
.vbtn.active{background:var(--accent);color:#fff}
.vbtn:hover:not(.active){background:rgba(255,255,255,.22)}

/* ---- Cam selected indicator ---- */
.cam-item.cam-selected{background:#383838}
.cam-item.cam-selected::after{content:'';position:absolute;right:10px;top:50%;transform:translateY(-50%);width:5px;height:5px;border-radius:50%;background:var(--accent)}

/* ---- Recording button ---- */
.rec-btn{display:flex;align-items:center;gap:4px;padding:3px 8px;border:none;border-radius:4px;background:rgba(250,78,78,.15);color:rgba(250,78,78,.7);font-size:10px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.5px;font-family:'Lato',sans-serif}
.rec-btn:hover{background:rgba(250,78,78,.28);color:#fa4e4e}
.rec-btn.recording{background:rgba(250,78,78,.28);color:#fa4e4e}
.rec-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.rec-btn.recording .rec-dot{animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
</style>
</head>

<script>
const COURT_W=8.23,COURT_L=23.77,NET_Y=11.885,SRV_N=5.485,SRV_F=18.285,CX=4.115;

// ---- 测试标定点（来自 image_test 三角化结果）----
const TEST_BALLS=[
  {label:'B1',x:6.809,y:1.816, z:0.177,color:'#4f88fa'},
  {label:'B2',x:4.197,y:11.986,z:0.081,color:'#29cb6f'},
  {label:'B3',x:1.760,y:18.326,z:0.074,color:'#fa9640'},
];

// ---- Date/time ----
function updateClock(){
  const now=new Date();
  document.getElementById('cur-date').textContent=now.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  document.getElementById('cur-time').textContent=now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
updateClock();setInterval(updateClock,1000);

// ---- 多摄像头视频控制 ----
let _viewMode='single';    // 'single' | 'grid'
let _selectedCam=null;     // 单路模式下选中的摄像头
let _lastPipelines={};     // 缓存最后一次 pipelines 状态
let _renderedKey='';       // 上次渲染的 key，避免不必要重绘

function setViewMode(mode){
  _viewMode=mode;
  document.getElementById('btn-single').classList.toggle('active',mode==='single');
  document.getElementById('btn-grid').classList.toggle('active',mode==='grid');
  _renderedKey='';          // 强制重绘
  renderVideoArea(_lastPipelines);
}

function selectCamera(name){
  _selectedCam=name;
  document.querySelectorAll('.cam-item').forEach(el=>{
    el.classList.toggle('cam-selected',el.dataset.cam===name);
  });
  if(_viewMode==='single'){
    _renderedKey='';
    renderVideoArea(_lastPipelines);
  }
}

function renderVideoArea(pipelines){
  if(pipelines) _lastPipelines=pipelines;
  const running=Object.entries(_lastPipelines)
    .filter(([,p])=>p.state==='running').map(([n])=>n);

  if(_viewMode==='single'){
    const cam=running.includes(_selectedCam)?_selectedCam:(running[0]||null);
    _renderSingle(cam);
  } else {
    _renderGrid(running.slice(0,4));
  }
}

function _renderSingle(cam){
  const key='single:'+(cam||'');
  if(key===_renderedKey) return;
  _renderedKey=key;
  const c=document.getElementById('video-container');
  c.className='mode-1';
  if(!cam){
    c.innerHTML='<div class="vid-empty">Camera feed (waiting...)</div>';
    document.getElementById('active-cam').textContent='Camera 01';
    return;
  }
  c.innerHTML=`<div class="vid-cell">
    <img src="/api/camera/${cam}/stream" alt="${cam}">
    <span class="vid-label">${cam}</span>
  </div>`;
  document.getElementById('active-cam').textContent=cam;
}

function _renderGrid(cams){
  const key='grid:'+cams.join(',');
  if(key===_renderedKey) return;
  _renderedKey=key;
  const c=document.getElementById('video-container');
  const n=cams.length;
  if(n===0){c.className='mode-1';c.innerHTML='<div class="vid-empty">Camera feed (waiting...)</div>';return;}
  c.className='mode-'+Math.min(n,4);
  c.innerHTML=cams.map(cam=>`
    <div class="vid-cell" onclick="selectCamera('${cam}');setViewMode('single')" title="点击全屏">
      <img src="/api/camera/${cam}/stream" alt="${cam}">
      <span class="vid-label">${cam}</span>
    </div>`).join('');
  document.getElementById('active-cam').textContent=cams.join(' / ');
}

// ---- Mini Map ----
function drawCourt(canvas,ballX,ballY){
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  const margin=12,cw=W-2*margin,ch=H-2*margin;
  const sx=cw/COURT_W,sy=ch/COURT_L;
  function tx(x){return margin+x*sx}
  function ty(y){return H-margin-y*sy}

  ctx.clearRect(0,0,W,H);
  // Background
  ctx.fillStyle='#1a2e1a';ctx.fillRect(0,0,W,H);
  // Court surface
  ctx.fillStyle='#2d5a3d';
  ctx.fillRect(tx(0),ty(COURT_L),COURT_W*sx,COURT_L*sy);
  // Service boxes - slightly different shade
  ctx.fillStyle='#346845';
  ctx.fillRect(tx(0),ty(SRV_F),COURT_W*sx,(SRV_F-SRV_N)*sy);

  ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
  // Court outline
  ctx.strokeRect(tx(0),ty(COURT_L),COURT_W*sx,COURT_L*sy);
  // Net
  ctx.beginPath();ctx.moveTo(tx(0),ty(NET_Y));ctx.lineTo(tx(COURT_W),ty(NET_Y));
  ctx.strokeStyle='#ccc';ctx.lineWidth=2.5;ctx.stroke();
  // Service lines
  ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
  [SRV_N,SRV_F].forEach(y=>{ctx.beginPath();ctx.moveTo(tx(0),ty(y));ctx.lineTo(tx(COURT_W),ty(y));ctx.stroke()});
  // Center service line
  ctx.beginPath();ctx.moveTo(tx(CX),ty(SRV_N));ctx.lineTo(tx(CX),ty(SRV_F));ctx.stroke();
  // Center marks
  ctx.beginPath();ctx.moveTo(tx(CX),ty(0));ctx.lineTo(tx(CX),ty(0.4));ctx.stroke();
  ctx.beginPath();ctx.moveTo(tx(CX),ty(COURT_L));ctx.lineTo(tx(CX),ty(COURT_L-0.4));ctx.stroke();

  // ---- 测试标定点（minimap 菱形）----
  TEST_BALLS.forEach(tb=>{
    const bx=tx(tb.x),by=ty(tb.y),r=4;
    ctx.beginPath();
    ctx.moveTo(bx,by-r);ctx.lineTo(bx+r,by);
    ctx.lineTo(bx,by+r);ctx.lineTo(bx-r,by);
    ctx.closePath();
    ctx.fillStyle=tb.color+'cc';ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=tb.color;ctx.font='bold 7px Lato';
    ctx.fillText(tb.label,bx+6,by+3);
  });

  // ---- 实时追踪球 ----
  if(ballX!=null&&ballY!=null){
    const bx=tx(ballX),by=ty(ballY);
    const grd=ctx.createRadialGradient(bx,by,0,bx,by,12);
    grd.addColorStop(0,'rgba(250,78,78,.6)');grd.addColorStop(1,'rgba(250,78,78,0)');
    ctx.fillStyle=grd;ctx.fillRect(bx-12,by-12,24,24);
    ctx.beginPath();ctx.arc(bx,by,5,0,Math.PI*2);ctx.fillStyle='#fa4e4e';ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke();
  }
}

// ---- 3D Map (simple top-down with height indicator) ----
function draw3DMap(canvas,ball){
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);

  // Grid
  const margin=40,cw=W-2*margin,ch=H-2*margin;
  ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=0.5;
  for(let i=0;i<=10;i++){
    const x=margin+cw*i/10;
    ctx.beginPath();ctx.moveTo(x,margin);ctx.lineTo(x,H-margin);ctx.stroke();
    const y=margin+ch*i/10;
    ctx.beginPath();ctx.moveTo(margin,y);ctx.lineTo(W-margin,y);ctx.stroke();
  }

  // Axes labels
  ctx.fillStyle='rgba(255,255,255,.4)';ctx.font='9px Lato';
  ctx.fillText('X (m)',W/2,H-5);
  ctx.save();ctx.translate(10,H/2);ctx.rotate(-Math.PI/2);ctx.fillText('Y (m)',0,0);ctx.restore();

  // Court outline (projected)
  const sx=cw/12,sy=ch/26;
  function px(x){return margin+(x+1.5)*sx}
  function py(y){return H-margin-(y+1)*sy}
  ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;
  ctx.strokeRect(px(0),py(COURT_L),COURT_W*sx,-COURT_L*sy);
  // Net
  ctx.beginPath();ctx.moveTo(px(0),py(NET_Y));ctx.lineTo(px(COURT_W),py(NET_Y));ctx.strokeStyle='rgba(255,255,255,.5)';ctx.stroke();

  const hScale=ch/10;

  // ---- 测试标定点（菱形标记 + 高度线）----
  TEST_BALLS.forEach(tb=>{
    const bx=px(tb.x),by=py(tb.y),hz=tb.z*hScale;
    // 地面投影（半透明圆）
    ctx.beginPath();ctx.arc(bx,by,3,0,Math.PI*2);
    ctx.fillStyle=tb.color+'44';ctx.fill();
    // 高度线（虚线）
    ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx,by-hz);
    ctx.strokeStyle=tb.color+'99';ctx.lineWidth=1;
    ctx.setLineDash([2,2]);ctx.stroke();ctx.setLineDash([]);
    // 菱形标记
    const r=5;
    ctx.beginPath();
    ctx.moveTo(bx,by-hz-r);ctx.lineTo(bx+r,by-hz);
    ctx.lineTo(bx,by-hz+r);ctx.lineTo(bx-r,by-hz);
    ctx.closePath();
    ctx.fillStyle=tb.color;ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=1;ctx.stroke();
    // 标签
    ctx.fillStyle=tb.color;ctx.font='bold 9px Lato';
    ctx.fillText(tb.label+' Z='+tb.z.toFixed(2)+'m',bx+8,by-hz-2);
  });

  // ---- 实时追踪球（红色圆形）----
  if(ball){
    const bx=px(ball.x),by=py(ball.y);
    const hz=ball.z*hScale;
    ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx,by-hz);
    ctx.strokeStyle='rgba(250,166,78,.6)';ctx.lineWidth=2;ctx.setLineDash([3,2]);ctx.stroke();ctx.setLineDash([]);
    ctx.beginPath();ctx.arc(bx,by,4,0,Math.PI*2);ctx.fillStyle='rgba(250,78,78,.3)';ctx.fill();
    ctx.beginPath();ctx.arc(bx,by-hz,5,0,Math.PI*2);ctx.fillStyle='#fa4e4e';ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 10px Lato';
    ctx.fillText(`(${ball.x.toFixed(1)}, ${ball.y.toFixed(1)}, ${ball.z.toFixed(1)})`,bx+10,by-hz);
  }
}

// ---- API ----
async function ctrlPipeline(name,action){
  try{await fetch(`/api/pipeline/${name}/${action}`,{method:'POST'})}catch(e){console.error(e)}
}

async function toggleTrackBall(el){
  el.classList.toggle('on');
  const state = el.classList.contains('on') ? 'on' : 'off';
  try{
    await fetch(`/api/function/track/${state}`,{method:'POST'});
  }catch(e){
    // 回滚 UI
    el.classList.toggle('on');
    console.error('toggleTrackBall failed',e);
  }
}

// ---- Recording ----
let _recording=false,_recStartTime=null,_recTimer=null;

async function toggleRecording(){
  const btn=document.getElementById('rec-btn');
  const dot=btn.querySelector('.rec-dot');
  const txt=btn.querySelector('.rec-text');
  if(!_recording){
    try{
      const r=await fetch('/api/recording/start',{method:'POST'});
      const data=await r.json();
      if(data.status==='recording'){
        _recording=true;_recStartTime=Date.now();
        btn.classList.add('recording');
        _recTimer=setInterval(_updateRecDuration,1000);
        _updateRecDuration();
      } else {
        console.warn('Recording start:',data.status);
        txt.textContent=data.status==='no_cameras_running'?'NO CAM':'REC';
        setTimeout(()=>{txt.textContent='REC'},2000);
      }
    }catch(e){console.error('Recording start failed:',e)}
  } else {
    try{
      const r=await fetch('/api/recording/stop',{method:'POST'});
      const data=await r.json();
      _recording=false;
      clearInterval(_recTimer);_recTimer=null;_recStartTime=null;
      btn.classList.remove('recording');
      txt.textContent='REC';
      if(data.files){
        const names=Object.entries(data.files).map(([cam,f])=>cam+': '+f.split(/[\\/]/).pop()).join('\n');
        console.log('Saved recordings:\n'+names);
      }
    }catch(e){console.error('Recording stop failed:',e)}
  }
}

function _updateRecDuration(){
  if(!_recStartTime)return;
  const s=Math.floor((Date.now()-_recStartTime)/1000);
  const m=String(Math.floor(s/60)).padStart(2,'0'),ss=String(s%60).padStart(2,'0');
  const txt=document.getElementById('rec-btn').querySelector('.rec-text');
  if(txt)txt.textContent=m+':'+ss;
}

async function poll(){
  try{
    const r=await fetch('/api/status');
    const d=await r.json();
    for(const[name,p]of Object.entries(d.pipelines)){
      const badge=document.getElementById('badge-'+name);
      const fpsEl=document.getElementById('fps-'+name);
      if(badge){badge.className='state-badge '+p.state;badge.textContent=p.state}
      if(fpsEl)fpsEl.textContent=p.fps.toFixed(1);
    }
    renderVideoArea(d.pipelines);
    const b=d.latest_ball_3d;
    if(b){
      drawCourt(document.getElementById('minimap'),b.x,b.y);
      draw3DMap(document.getElementById('map3d'),b);
    }else{
      drawCourt(document.getElementById('minimap'),null,null);
      draw3DMap(document.getElementById('map3d'),null);
    }
  }catch(e){console.error(e)}
}

// Init
drawCourt(document.getElementById('minimap'),null,null);
draw3DMap(document.getElementById('map3d'),null);
setInterval(poll,500);
</script>
